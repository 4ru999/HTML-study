<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML基礎レッスン</title>
  </head>
  <body>
    <!-- Step 1: 見出しを書いてみよう -->
    <div>
      <h1>自己紹介ページ</h1>

      <!-- Step 2: ここに <h2> と <p> を追加しよう -->
      <h2>はじめまして</h2>
      <p>私の名前は金森申揮です！イベント運営の勉強をしています！</p>
      <p>普段は学生をしながらアパレルショップで働いてます！</p>
      <p>趣味は古着屋巡りと喫茶店巡りです👖☕</p>
      <!-- Step 3: ここに <ul> または <ol> のリストを追加しよう -->
      <h1>好きな食べ物(ランキング)</h1>
    </div>

    <div>
      <ol>
        <li>ラーメン</li>
        <li>焼き肉</li>
        <li>ハンバーガー</li>
      </ol>
      <!-- Step 4: ここに <a> リンクと <img> 画像を追加しよう -->
      <h2>普段買うアパレルショップのリンクです！</h2>
      <p>HARE</p>
      <a href="https://hare.jp/">https://hare.jp/</a>
      <p>not conventional</p>
      <a href="https://not-conventional.com/">https://not-conventional.com/</a>
      <h2>写真</h2>
      <img
        src="https://media.discordapp.net/attachments/883636582232514640/1464177259714707537/P1232378.JPG?ex=69f11a95&is=69efc915&hm=7020f1202a23778ccf4a02e1cb340b3107cc9dde31bacfc6f5749aecf101615d&=&format=webp&width=583&height=438"
        alt=""
      />
    </div>

    <!-- Step 5: <div> でグループ化してみよう -->
  </body>
</html>
